name: Rent Roll Report

on:
  workflow_dispatch:  # manual trigger from GitHub UI
  schedule:
    - cron: '0 8 1 * *'  # 1st of each month at 8am UTC

jobs:
  rent-report:
    runs-on: ubuntu-latest
    
    env:
      APPFOLIO_CLIENT_ID: ${{ secrets.APPFOLIO_CLIENT_ID }}
      APPFOLIO_CLIENT_SECRET: ${{ secrets.APPFOLIO_CLIENT_SECRET }}
      APPFOLIO_API_URL: ${{ secrets.APPFOLIO_API_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas python-dotenv

      - name: Pull rent roll & calculate averages
        run: python src/rent_report.py --output rent_roll.csv

      - name: Upload rent roll CSV
        uses: actions/upload-artifact@v4
        with:
          name: rent-roll-${{ github.run_id }}
          path: rent_roll.csv
          retention-days: 90
