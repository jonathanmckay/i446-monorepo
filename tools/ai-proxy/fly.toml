app = "m5x2-ai-proxy"
primary_region = "sjc"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/proxy.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1  # keep warm — proxy adds latency on cold start

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "proxy_data"
  destination = "/data"
