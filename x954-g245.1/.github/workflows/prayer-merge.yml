name: Prayer Merge

on:
  schedule:
    # Run at 5:30 AM UTC daily
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to process (YYYY-MM-DD, default: yesterday)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no actual changes)'
        required: false
        type: boolean
        default: false

jobs:
  prayer-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openpyxl requests

      - name: Download Excel from OneDrive
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import requests
          import urllib.parse

          # Get access token using refresh token
          token_url = "https://login.microsoftonline.com/consumers/oauth2/v2.0/token"
          token_data = {
              'client_id': os.environ['AZURE_CLIENT_ID'],
              'client_secret': os.environ['AZURE_CLIENT_SECRET'],
              'refresh_token': os.environ['AZURE_REFRESH_TOKEN'],
              'grant_type': 'refresh_token',
              'scope': 'Files.ReadWrite Files.ReadWrite.All offline_access',
          }

          resp = requests.post(token_url, data=token_data)
          if resp.status_code != 200:
              print(f"Token refresh failed: {resp.status_code}")
              print(resp.text)
              exit(1)

          tokens = resp.json()
          access_token = tokens['access_token']
          new_refresh_token = tokens.get('refresh_token', '')
          print("✓ Got access token")

          # Save the new refresh token for rotation
          if new_refresh_token:
              with open('new_refresh_token.txt', 'w') as f:
                  f.write(new_refresh_token)
              print("✓ Captured rotated refresh token")

          # Get file directly by path (URL-encode the filename)
          filename = "Neon分v11.xlsx"
          encoded_path = urllib.parse.quote(filename)
          file_url = f"https://graph.microsoft.com/v1.0/me/drive/root:/{encoded_path}"
          headers = {'Authorization': f'Bearer {access_token}'}

          resp = requests.get(file_url, headers=headers)
          if resp.status_code != 200:
              print(f"Get file failed: {resp.status_code}")
              print(resp.text)
              exit(1)

          file_item = resp.json()
          print(f"✓ Found: {file_item['name']}")

          # Download the file
          download_url = file_item['@microsoft.graph.downloadUrl']
          resp = requests.get(download_url)

          if resp.status_code != 200:
              print(f"Download failed: {resp.status_code}")
              exit(1)

          with open('Neon分v11.xlsx', 'wb') as f:
              f.write(resp.content)

          print(f"✓ Downloaded {len(resp.content)} bytes")
          EOF

      - name: Rotate Azure refresh token
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f new_refresh_token.txt ]; then
            gh secret set AZURE_REFRESH_TOKEN < new_refresh_token.txt
            rm new_refresh_token.txt
            echo "✓ Rotated refresh token in GitHub secrets"
          else
            echo "⚠️ No new refresh token to rotate"
          fi

      - name: Run Prayer Merge
        env:
          TOGGL_API_TOKEN: ${{ secrets.TOGGL_API_TOKEN }}
          TOGGL_WORKSPACE_ID: ${{ secrets.TOGGL_WORKSPACE_ID }}
          TOGGL_PROJECT_ID: ${{ secrets.TOGGL_PROJECT_ID }}
        run: |
          ARGS="--excel-file Neon分v11.xlsx"

          # Add date argument if provided
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi

          # Add dry-run flag if enabled
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python prayer_merge.py $ARGS

      - name: Upload Excel back to OneDrive
        if: success() && github.event.inputs.dry_run != 'true'
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import requests

          # Get access token
          token_url = "https://login.microsoftonline.com/consumers/oauth2/v2.0/token"
          token_data = {
              'client_id': os.environ['AZURE_CLIENT_ID'],
              'client_secret': os.environ['AZURE_CLIENT_SECRET'],
              'refresh_token': os.environ['AZURE_REFRESH_TOKEN'],
              'grant_type': 'refresh_token',
              'scope': 'Files.ReadWrite Files.ReadWrite.All offline_access',
          }

          resp = requests.post(token_url, data=token_data)
          if resp.status_code != 200:
              print(f"Token refresh failed: {resp.status_code}")
              print(resp.text)
              exit(1)

          tokens = resp.json()
          access_token = tokens['access_token']

          # Upload file (replace existing)
          upload_url = "https://graph.microsoft.com/v1.0/me/drive/root:/Neon分v11.xlsx:/content"
          headers = {
              'Authorization': f'Bearer {access_token}',
              'Content-Type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
          }

          with open('Neon分v11.xlsx', 'rb') as f:
              file_content = f.read()

          resp = requests.put(upload_url, headers=headers, data=file_content)

          if resp.status_code in (200, 201):
              print("✓ Uploaded updated Excel to OneDrive")
          else:
              print(f"Upload failed: {resp.status_code}")
              print(resp.text)
              exit(1)
          EOF
